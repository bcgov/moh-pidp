kind: Deployment
apiVersion: apps/v1
metadata:
  name: {{ .Values.appName }}
  labels:
    app: {{ .Values.appName }}
  annotations:
    image.openshift.io/triggers: |-
      [
        {
          "from": {
            "kind": "ImageStreamTag",
            "namespace": "{{ .Values.licensePlate }}-tools",
            "name": "{{ .Values.appName }}:{{ .Values.imageStreamTag }}"
          },
          "fieldPath": "spec.template.spec.containers[1].image"
        }
      ]
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.appName }}
  template:
    metadata:
      labels:
        app: {{ .Values.appName }}

    spec:
      containers:
        - name: midas-probe
          image: {{ .Values.dockerhost }}/{{ .Values.licensePlate }}-tools/{{ .Values.appName }}:{{ .Values.imageStreamTag }}
          imagePullPolicy: Always
          env:
            - name: environment
              value: {{ .Values.environment }}
            - name: servicename
              value: {{ .Values.appName }}
            - name: cluster
              value: {{ .Values.cluster }}
            - name: gslb_host
              value: {{ .Values.gslb_host }}
            - name: namespace
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            {{- if .Values.fluentbit.enabled }}
            - name: SERVER_LOGFILE
              value: /tmp/*.log
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: kube-api-access-rsh4p
              readOnly: true
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
            - name: who-is-active
              mountPath: /tmp/who_is_active.json
              subPath: who_is_active.json
            {{- if .Values.fluentbit.enabled }}
            - name: log-storage
              mountPath: /tmp/
            {{- end }}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
        {{- if .Values.fluentbit.enabled }}
        - name: fluentbit
          image: {{ .Values.fluentbit.imageRegistry }}
          imagePullPolicy: {{ .Values.fluentbit.imagePullPolicy }}
          {{- if .Values.fluentbit.securityContext.enabled }}
          securityContext: {{- omit .Values.fluentbit.securityContext "enabled" | toYaml | nindent 12 }}
          {{- end }}
          env:
            - name: SERVER_LOGFILE
              value: /tmp/*.log
          ports:
            - name: metrics
              containerPort: 2020
              protocol: TCP
            - name: http-plugin
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 10
            timeoutSeconds: 1
            periodSeconds: 60
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 10
            timeoutSeconds: 1
            periodSeconds: 60
            successThreshold: 1
            failureThreshold: 3
          {{- if .Values.fluentbit.resources }}
          resources: {{- toYaml .Values.fluentbit.resources | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: fluentbit-config
              mountPath: /fluent-bit/etc
            - name: log-storage
              mountPath: /tmp/
        {{- end }} 
      automountServiceAccountToken: false
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      serviceAccount: midas-probe
      volumes:
        - name: kube-api-access-rsh4p
          projected:
            sources:
              - serviceAccountToken:
                  expirationSeconds: 3607
                  path: token
              - configMap:
                  name: kube-root-ca.crt
                  items:
                    - key: ca.crt
                      path: ca.crt
              - downwardAPI:
                  items:
                    - path: namespace
                      fieldRef:
                        apiVersion: v1
                        fieldPath: metadata.namespace
              - configMap:
                  name: openshift-service-ca.crt
                  items:
                    - key: service-ca.crt
                      path: service-ca.crt
            defaultMode: 420
        - name: who-is-active
          emptyDir: {}
        {{- if .Values.fluentbit.enabled }}
        - name: log-storage
          emptyDir: {}
        - name: fluentbit-config
          configMap:
            name: {{ .Values.appName }}-fluentbit-config
        {{- end }}
      schedulerName: default-scheduler
      terminationGracePeriodSeconds: 30
