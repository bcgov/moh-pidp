{{- if .Values.fluentbit.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-fluentbit-config
  labels: {{- include "common.labels.standard" . | nindent 4 }}
    {{- if .Values.commonLabels }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonLabels "context" $ ) | nindent 4 }}
    {{- end }}
data:
  fluent-bit.conf: |
    [SERVICE]
      Flush         5
      Daemon        Off
      # define the log format (see additional config map key/value)
      Parsers_File  parsers.conf
      Log_Level     info
      HTTP_Server   On
      HTTP_Listen   0.0.0.0
      HTTP_Port     2020
      Health_Check  On

    [INPUT]
      # get logs from file written by nginx app
      Name        tail
      Path        /tmp/*.log
      Tag         app

    [FILTER]
      # filter logs based on certain keyword(s)
      name   grep
      match  app
      Logical_Op or
      regex  log error
      regex  log crit
      regex  log alert
      regex  log emerg
        
    [FILTER]
      #ignore "No such file or directory" error from app logs
      name     grep
      match    app
      Exclude  log No\ssuch\sfile\sor\sdirectory
      Exclude  log /.well-known

    [FILTER]
      name          parser
      match         app
      Key_Name      log
      Parser        parser
      Preserve_Key  On

    [FILTER]
      # modify log entry to include namespace and container name
      name    record_modifier
      match   app
      # add namespace
      Record namespace {{ .Values.licensePlate }}-{{ .Values.environment }}
      # add container name
      Record container ingress

    [FILTER]
      Name          rewrite_tag
      Match         app
      Rule          $level ([a-zA-Z]*)$ $TAG.$level true
      Emitter_Name  re_emitted


    [OUTPUT]
      name                 slack
      match                app
      webhook             {{ .Values.fluentbit.slack_webhook }}

    [OUTPUT]
      Name    stdout
      Match   app
      Format  json_lines

  parsers.conf: |
    [PARSER]
      Name             parser
      Format regex
      Regex  (?<timestamp>\d{4}\/\d{2}\/\d{2} \d{2}:\d{2}:\d{2}) \[(?<level>.*)\]\ (?<process_id>\d*)#(?<thread_id>\d*): (?<message>.*)
      Time_Key time
{{- end }}